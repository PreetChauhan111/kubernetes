apiVersion: v1
kind: Pod
metadata:
  name: secrets
  labels:
    app.kubernetes.io/name: secrets
spec:
  containers:
  - name: secrets
    image: nginx
    env:
      - name: SECRET_USERNAME
        valueFrom:
          secretKeyRef:
            name: backend-user
            key: backend-username
      - name: DB_USERNAME
        valueFrom:
          secretKeyRef:
            name: db-user
            key: db-username