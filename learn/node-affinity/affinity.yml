apiVersion: v1
kind: Pod
metadata:
  labels:
    run: redis
  name: redis-3
spec:
  containers:
  - image: redis
    name: redis-3
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: disktype
            operator: Exists  
status: {}
